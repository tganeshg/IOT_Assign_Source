<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart Home — Dashboard &amp; History</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #e8ecf1;
      --card: #ffffff;
      --text: #1a2332;
      --muted: #5c6b7a;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --on: #16a34a;
      --off: #94a3b8;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
      /* Base text size (all rem scale from this; tweak here for readability) */
      --fs-root: 21px;
    }
    * { box-sizing: border-box; }
    html {
      font-size: var(--fs-root);
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem;
      line-height: 1.35;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }
    header {
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 0.55rem 0.75rem;
      padding-left: max(0.75rem, env(safe-area-inset-left));
      padding-right: max(0.75rem, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 0.45rem;
      min-width: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
      flex: 1 1 auto;
    }
    .btn-home {
      border: none;
      background: var(--bg);
      border-radius: 8px;
      padding: 0.28rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      flex-shrink: 0;
      width: 2.25rem;
      height: 2.25rem;
      touch-action: manipulation;
    }
    .btn-home:hover { background: #e2e8f0; }
    .btn-home:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn-home svg {
      width: 1.2rem;
      height: 1.2rem;
      color: var(--accent);
    }
    header h1 {
      margin: 0;
      font-size: clamp(1rem, 3.6vw, 1.25rem);
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .tabs {
      display: flex;
      gap: 0.15rem;
      background: var(--bg);
      padding: 0.15rem;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .tabs button {
      border: none;
      padding: 0.28rem 0.45rem;
      min-height: 2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.75rem;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
      touch-action: manipulation;
    }
    .tabs button .lbl-short { display: none; }
    .tabs button.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: var(--shadow);
    }
    main {
      padding: 0.75rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      max-width: 1200px;
      margin: 0 auto;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .grid-rooms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
      gap: 0.75rem;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.85rem 0.95rem;
    }
    .card h2 {
      margin: 0 0 0.6rem;
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid #eef2f7;
      min-height: 2.25rem;
    }
    .row:last-child { border-bottom: none; }
    /* Only the left column caption — NOT label.tgl (toggle) or it stretches full width */
    .row > label {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 5.75rem;
    }
    .pill {
      font-weight: 650;
      font-size: 0.8rem;
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      background: #f1f5f9;
    }
    .pill.on { background: #dcfce7; color: var(--on); }
    .pill.off { background: #f1f5f9; color: var(--off); }
    .mode-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem;
      flex: 1;
      min-width: 0;
    }
    .mode-row .mode-label {
      min-width: 3.75rem;
      font-weight: 650;
      font-size: 0.85rem;
      text-align: right;
      color: var(--text);
    }
    /* Toggle: fixed size (flex cannot stretch) — larger ON/OFF for touch */
    label.tgl {
      position: relative;
      display: block;
      box-sizing: border-box;
      flex: 0 0 40px;
      width: 40px;
      min-width: 40px;
      max-width: 40px;
      height: 22px;
      padding: 0;
      margin: 0;
      align-self: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tgl input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .tgl-body {
      position: absolute;
      inset: 0;
      background: #e5e7eb;
      border-radius: 22px;
      border: 1px solid #cbd5e1;
      transition: background 0.2s, border-color 0.2s;
      box-sizing: border-box;
    }
    .tgl-knob {
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 50%;
      margin-top: -9px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
      transition: left 0.2s ease;
    }
    .tgl input:checked + .tgl-body {
      background: #3b82f6;
      border-color: #2563eb;
    }
    .tgl input:checked + .tgl-body .tgl-knob {
      left: calc(100% - 20px);
    }
    .tgl input:focus-visible + .tgl-body {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .room-ctrl {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem;
      flex: 1;
      min-width: 0;
    }
    .wreading {
      font-size: 0.8rem;
      color: #64748b;
      min-width: 3.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .wreading.zero { color: #94a3b8; }
    .history-block {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .history-block h2 { margin: 0 0 0.45rem; font-size: 0.88rem; }
    #plot-line {
      min-height: 440px;
      width: 100%;
    }
    .history-block iframe { border: none; width: 100%; min-height: 440px; border-radius: 8px; }
    .gauges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .gauge-box {
      width: 200px;
      height: 200px;
    }
    .fridge-line {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fridge-line strong { color: var(--text); }

    @media (max-width: 560px) {
      .tabs button { padding: 0.26rem 0.34rem; font-size: 0.72rem; min-height: 1.95rem; }
      .tabs button .lbl-full { display: none; }
      .tabs button .lbl-short { display: inline; }
    }
    @media (max-width: 400px) {
      :root { --fs-root: 18px; }
      header { padding: 0.45rem 0.5rem; padding-left: max(0.5rem, env(safe-area-inset-left)); padding-right: max(0.5rem, env(safe-area-inset-right)); }
      header h1 { font-size: 0.82rem; max-width: 42vw; }
      .tabs button { padding: 0.28rem 0.32rem; min-width: 0; }
    }
    @media (max-width: 480px) {
      .row { gap: 0.5rem; padding: 0.4rem 0; }
      .row > label { min-width: 4.75rem; font-size: 0.78rem; }
      .mode-row .mode-label { min-width: 3rem; font-size: 0.82rem; }
      .wreading { min-width: 3rem; font-size: 0.78rem; }
      label.tgl {
        flex: 0 0 34px;
        width: 34px;
        min-width: 34px;
        max-width: 34px;
        height: 19px;
      }
      .tgl-body { border-radius: 19px; }
      .tgl-knob { width: 15px; height: 15px; margin-top: -7.5px; left: 2px; }
      .tgl input:checked + .tgl-body .tgl-knob { left: calc(100% - 17px); }
      #plot-line { min-height: 300px; }
      .history-block iframe { min-height: 320px; }
      .gauge-box { width: min(100%, 180px); height: auto; min-height: 170px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <button type="button" class="btn-home" id="btn-home" title="Dashboard" aria-label="Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <h1>Smart Home — IoT</h1>
    </div>
    <nav class="tabs" role="tablist" aria-label="Main">
      <button type="button" class="active" id="tab-dash" data-panel="dashboard" title="Dashboard">
        <span class="lbl-full">Dashboard</span><span class="lbl-short">Dash</span>
      </button>
      <button type="button" id="tab-hist" data-panel="history" title="History">
        <span class="lbl-full">History</span><span class="lbl-short">Hist</span>
      </button>
    </nav>
  </header>
  <main>
    <section id="panel-dashboard" class="panel active" aria-label="Dashboard">
      <div class="grid-rooms">
        <div class="card" id="room1-card">
          <h2>Room 1</h2>
          <div class="row">
            <label>Mode</label>
            <div class="mode-row">
              <span class="mode-label" id="r1-mode-text">—</span>
              <label class="tgl" title="Off = Manual, On = Auto">
                <input type="checkbox" id="r1-mode-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
          <div class="row">
            <label>Motion</label>
            <span class="pill" id="r1-motion">—</span>
          </div>
          <div class="row">
            <label>Person</label>
            <span class="pill" id="r1-person">—</span>
          </div>
          <div class="row">
            <label>Light</label>
            <div class="room-ctrl">
              <span class="wreading" id="r1-light-p">0 W</span>
              <label class="tgl" title="Light">
                <input type="checkbox" id="r1-light-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
          <div class="row">
            <label>Fan</label>
            <div class="room-ctrl">
              <span class="wreading" id="r1-fan-p">0 W</span>
              <label class="tgl" title="Fan">
                <input type="checkbox" id="r1-fan-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
        </div>
        <div class="card" id="room2-card">
          <h2>Room 2</h2>
          <div class="row">
            <label>Mode</label>
            <div class="mode-row">
              <span class="mode-label" id="r2-mode-text">—</span>
              <label class="tgl" title="Off = Manual, On = Auto">
                <input type="checkbox" id="r2-mode-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
          <div class="row">
            <label>Motion</label>
            <span class="pill" id="r2-motion">—</span>
          </div>
          <div class="row">
            <label>Person</label>
            <span class="pill" id="r2-person">—</span>
          </div>
          <div class="row">
            <label>Light</label>
            <div class="room-ctrl">
              <span class="wreading" id="r2-light-p">0 W</span>
              <label class="tgl" title="Light">
                <input type="checkbox" id="r2-light-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
          <div class="row">
            <label>AC</label>
            <div class="room-ctrl">
              <span class="wreading" id="r2-ac-p">0 W</span>
              <label class="tgl" title="AC">
                <input type="checkbox" id="r2-ac-sw" role="switch" />
                <span class="tgl-body"><span class="tgl-knob"></span></span>
              </label>
            </div>
          </div>
          <p class="fridge-line">Fridge (monitor): <strong id="fridge-p">— W</strong></p>
        </div>
      </div>
    </section>

    <section id="panel-history" class="panel" aria-label="History">
      <div class="history-block">
        <h2>Live power (latest per sensor)</h2>
        <div class="gauges" id="gauges"></div>
      </div>
      <div class="history-block">
        <h2>Power over time</h2>
        <div id="plot-line"></div>
      </div>
      <div class="history-block">
        <h2>Average power per hour</h2>
        <iframe id="iframe-bar" title="Bar graph" src="/history/bar_graph"></iframe>
      </div>
    </section>
  </main>

  <script>
    const NAMES = {
      1: 'R1 PIR', 2: 'R1 Light', 3: 'R1 Fan',
      4: 'R2 PIR', 5: 'R2 Light', 6: 'R2 AC', 7: 'R2 Fridge'
    };
    const SERIES_COLORS = ['#2563eb', '#7c3aed', '#db2777', '#ea580c', '#16a34a', '#0891b2', '#ca8a04'];

    let suppress = false;
    /** Raw W from MQTT / DB (same as Modbus read); display is gated by load ON. */
    let powerCache = { 1: null, 2: null, 3: null, 4: null, 5: null, 6: null, 7: null };
    let lineChartThrottle = 0;
    var lastGaugeSig = '';

    function historyTabActive() {
      return document.getElementById('panel-history').classList.contains('active');
    }

    function showDashboardTab() {
      document.querySelectorAll('.tabs button').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
      document.getElementById('tab-dash').classList.add('active');
      document.getElementById('panel-dashboard').classList.add('active');
    }

    function ynPill(el, on) {
      el.textContent = on ? 'Yes' : 'No';
      el.className = 'pill ' + (on ? 'on' : 'off');
    }
    function inOutPill(el, on) {
      el.textContent = on ? 'In' : 'Out';
      el.className = 'pill ' + (on ? 'on' : 'off');
    }

    var fetchJsonOpts = { cache: 'no-store', headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' } };
    /** Drop stale /api/state responses (out-of-order HTTP) and abort overlapping fetches. */
    var stateFetchGen = 0;
    var stateFetchAbort = null;

    function invalidateInflightStateFetch() {
      stateFetchGen++;
      if (stateFetchAbort) {
        try { stateFetchAbort.abort(); } catch (e) {}
        stateFetchAbort = null;
      }
    }

    function mergePowerFromState(s) {
      if (!s.powerW) return;
      var p = s.powerW;
      if (p.r1Light !== undefined && p.r1Light !== null) powerCache[2] = Number(p.r1Light);
      if (p.r1Fan !== undefined && p.r1Fan !== null) powerCache[3] = Number(p.r1Fan);
      if (p.r2Light !== undefined && p.r2Light !== null) powerCache[5] = Number(p.r2Light);
      if (p.r2Ac !== undefined && p.r2Ac !== null) powerCache[6] = Number(p.r2Ac);
      if (p.fridge !== undefined && p.fridge !== null) powerCache[7] = Number(p.fridge);
    }

    function mergePowerRawById(s) {
      if (!s.powerRawById) return;
      Object.keys(s.powerRawById).forEach(function (k) {
        powerCache[parseInt(k, 10)] = Number(s.powerRawById[k]);
      });
    }

    function setWReading(el, rawW, loadOn) {
      if (!loadOn) {
        el.textContent = '0 W';
        el.classList.add('zero');
        return;
      }
      el.classList.remove('zero');
      if (rawW == null || rawW === '') {
        el.textContent = '— W';
        return;
      }
      el.textContent = Math.round(Number(rawW)) + ' W';
    }

    function refreshLoadPowerDisplay() {
      setWReading(document.getElementById('r1-light-p'), powerCache[2], document.getElementById('r1-light-sw').checked);
      setWReading(document.getElementById('r1-fan-p'), powerCache[3], document.getElementById('r1-fan-sw').checked);
      setWReading(document.getElementById('r2-light-p'), powerCache[5], document.getElementById('r2-light-sw').checked);
      setWReading(document.getElementById('r2-ac-p'), powerCache[6], document.getElementById('r2-ac-sw').checked);
      var fw = powerCache[7];
      document.getElementById('fridge-p').textContent =
        (fw != null && fw !== '') ? Math.round(Number(fw)) + ' W' : '— W';
    }

    function applyState(s) {
      const r1 = s.room1, r2 = s.room2;
      document.getElementById('r1-mode-text').textContent = r1.auto ? 'Auto' : 'Manual';
      document.getElementById('r2-mode-text').textContent = r2.auto ? 'Auto' : 'Manual';
      suppress = true;
      document.getElementById('r1-mode-sw').checked = !!r1.auto;
      document.getElementById('r2-mode-sw').checked = !!r2.auto;
      document.getElementById('r1-light-sw').checked = !!r1.light;
      document.getElementById('r1-fan-sw').checked = !!r1.fan;
      document.getElementById('r2-light-sw').checked = !!r2.light;
      document.getElementById('r2-ac-sw').checked = !!r2.ac;
      document.getElementById('r1-mode-sw').setAttribute('aria-checked', r1.auto ? 'true' : 'false');
      document.getElementById('r2-mode-sw').setAttribute('aria-checked', r2.auto ? 'true' : 'false');
      document.getElementById('r1-light-sw').setAttribute('aria-checked', r1.light ? 'true' : 'false');
      document.getElementById('r1-fan-sw').setAttribute('aria-checked', r1.fan ? 'true' : 'false');
      document.getElementById('r2-light-sw').setAttribute('aria-checked', r2.light ? 'true' : 'false');
      document.getElementById('r2-ac-sw').setAttribute('aria-checked', r2.ac ? 'true' : 'false');
      suppress = false;

      ynPill(document.getElementById('r1-motion'), !!r1.pir);
      ynPill(document.getElementById('r2-motion'), !!r2.pir);
      inOutPill(document.getElementById('r1-person'), !!r1.person);
      inOutPill(document.getElementById('r2-person'), !!r2.person);

      mergePowerFromState(s);
      mergePowerRawById(s);
      if (s.fridgePowerW != null && s.powerW == null) {
        powerCache[7] = s.fridgePowerW;
      }
      refreshLoadPowerDisplay();
      if (historyTabActive()) refreshHistoryGauges();
    }

    function refreshHistoryGauges() {
      var rows = [];
      [1, 2, 3, 4, 5, 6, 7].forEach(function (id) {
        var v = powerCache[id];
        if (v != null && v !== '') rows.push({ sensorID: id, power: Number(v) });
      });
      var box = document.getElementById('gauges');
      if (!rows.length) {
        if (box) {
          box.innerHTML = '';
          lastGaugeSig = '';
        }
        return;
      }
      updateGauges(rows);
    }

    /** In-memory MQTT mirror from server — primary live path (does not rely on WebSocket). */
    function pollLiveState() {
      invalidateInflightStateFetch();
      var gen = stateFetchGen;
      var ctrl = new AbortController();
      stateFetchAbort = ctrl;
      return fetch('/api/state', Object.assign({}, fetchJsonOpts, { signal: ctrl.signal }))
        .then(function (r) { return r.json(); })
        .then(function (s) {
          if (gen !== stateFetchGen) return;
          applyState(s);
        })
        .catch(function (e) {
          if (e.name === 'AbortError') return;
          console.warn(e);
        })
        .finally(function () {
          if (stateFetchAbort === ctrl) stateFetchAbort = null;
        });
    }

    function gaugeMaxForSensor(sid) {
      if (sid === 6) return 4000;
      if (sid === 7) return 600;
      return 400;
    }

    function gaugeTrace(row) {
      var title = NAMES[row.sensorID] || ('ID ' + row.sensorID);
      var max = gaugeMaxForSensor(row.sensorID);
      return {
        type: 'indicator',
        mode: 'gauge+number',
        value: row.power,
        title: { text: title },
        gauge: {
          axis: { range: [0, max] },
          bar: { color: '#2563eb' },
          bgcolor: '#f1f5f9',
        }
      };
    }
    var gaugeLayout = { margin: { t: 36, b: 8, l: 24, r: 24 }, height: 200 };

    function updateGauges(rows) {
      const box = document.getElementById('gauges');
      if (!box || !rows.length) return;
      var sig = rows.map(function (r) { return r.sensorID; }).sort(function (a, b) { return a - b; }).join(',');
      var canUpdate = sig === lastGaugeSig && box.querySelector('.gauge-box');
      if (canUpdate) {
        rows.forEach(function (row) {
          var gid = 'gauge-' + row.sensorID;
          if (document.getElementById(gid)) {
            Plotly.react(gid, [gaugeTrace(row)], gaugeLayout);
          }
        });
        return;
      }
      lastGaugeSig = sig;
      box.innerHTML = '';
      rows.forEach(function (row) {
        var gid = 'gauge-' + row.sensorID;
        var d = document.createElement('div');
        d.className = 'gauge-box';
        d.id = gid;
        box.appendChild(d);
        Plotly.newPlot(gid, [gaugeTrace(row)], gaugeLayout);
      });
    }

    async function loadLineChartJson(force) {
      const el = document.getElementById('plot-line');
      if (!el || !historyTabActive()) return;
      var now = Date.now();
      if (!force && now - lineChartThrottle < 800) return;
      lineChartThrottle = now;
      try {
        const res = await fetch('/api/history_series?t=' + now, fetchJsonOpts);
        const data = await res.json();
        const pts = data.points || [];
        if (!pts.length) {
          try { Plotly.purge(el); } catch (e) {}
          el.removeAttribute('data-plotted');
          el.innerHTML = '<p class="muted" style="padding:1rem;">No history yet. When mainProc publishes <code>sensor/data</code>, the chart fills in.</p>';
          return;
        }
        var by = {};
        pts.forEach(function (row) {
          var id = row.sensorID;
          if (!by[id]) by[id] = { x: [], y: [], name: NAMES[id] || ('ID ' + id) };
          by[id].x.push(row.t);
          by[id].y.push(row.p);
        });
        var keys = Object.keys(by).sort(function (a, b) { return Number(a) - Number(b); });
        var traces = keys.map(function (k, idx) {
          return {
            x: by[k].x,
            y: by[k].y,
            name: by[k].name,
            mode: 'lines',
            line: { width: 2, color: SERIES_COLORS[idx % SERIES_COLORS.length] }
          };
        });
        var layout = {
          title: 'Power (W) over time',
          template: 'plotly_white',
          height: 420,
          margin: { t: 56, r: 20, b: 56, l: 56 },
          xaxis: { title: 'Time' },
          yaxis: { title: 'W' },
          showlegend: true,
          legend: { orientation: 'h', y: -0.25 }
        };
        var opts = { responsive: true };
        if (el.getAttribute('data-plotted') === '1') {
          Plotly.react(el, traces, layout, opts);
        } else {
          Plotly.newPlot(el, traces, layout, opts);
          el.setAttribute('data-plotted', '1');
        }
      } catch (e) { console.warn(e); }
    }

    function wireCmd(el, room, cmd) {
      el.addEventListener('change', async function () {
        if (suppress) return;
        const val = el.checked;
        el.setAttribute('aria-checked', val ? 'true' : 'false');
        refreshLoadPowerDisplay();
        const body = cmd === 'mode'
          ? { room: room, cmd: 'mode', value: val }
          : { room: room, cmd: cmd, value: val };
        try {
          const r = await fetch('/api/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!r.ok) {
            console.warn('command failed', await r.text());
            pollLiveState();
            return;
          }
          pollLiveState();
        } catch (e) { console.warn(e); }
      });
    }

    document.getElementById('btn-home').addEventListener('click', function () {
      showDashboardTab();
    });

    document.querySelectorAll('.tabs button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tabs button').forEach(function (b) { b.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
        if (btn.dataset.panel === 'history') {
          pollLiveState().then(function () {
            loadLineChartJson(true);
          });
          document.getElementById('iframe-bar').src = '/history/bar_graph?t=' + Date.now();
        }
      });
    });

    wireCmd(document.getElementById('r1-mode-sw'), 1, 'mode');
    wireCmd(document.getElementById('r2-mode-sw'), 2, 'mode');
    wireCmd(document.getElementById('r1-light-sw'), 1, 'light');
    wireCmd(document.getElementById('r1-fan-sw'), 1, 'fan');
    wireCmd(document.getElementById('r2-light-sw'), 2, 'light');
    wireCmd(document.getElementById('r2-ac-sw'), 2, 'ac');

    pollLiveState();

    function resyncFromServer() {
      pollLiveState();
    }

    const socket = io({ transports: ['polling'] });
    socket.on('connect', function () { resyncFromServer(); });
    socket.on('state', function (s) {
      invalidateInflightStateFetch();
      applyState(s);
    });
    socket.on('sensor_batch', function () {
      pollLiveState();
      if (historyTabActive()) loadLineChartJson(true);
    });

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') resyncFromServer();
    });

    setInterval(pollLiveState, 280);
    setInterval(function () {
      if (historyTabActive()) loadLineChartJson(false);
    }, 2000);
  </script>
</body>
</html>
